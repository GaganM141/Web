<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestedList</title>
</head>
<body>
    <h1>Web Technologies</h1>
    <ol>
        <li>frontend</li>
        <ul type="">
            <li>Html</li>
            <li>css</li>
            <li>js</li>        
        </ul>
        <li>Backend</li>
        <ul type="square">
            <li>node</li>
            <li>express</li>
            <li>php</li>
        </ul>
        <li>Data Base</li>
        <ul type="desc">
            <li>mySQL</li>
            <li>Mongodb</li>
            <li>reactJS</li>
        </ul>
    </ol>
</body>
</html>
